<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Copilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .chat-bubble-user { background: #3b82f6; color: white; border-radius: 20px 20px 4px 20px; }
    .chat-bubble-ai { background: #1f2937; color: white; border-radius: 20px 20px 20px 4px; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-2xl mx-auto p-4">
    <div class="flex items-center gap-3 mb-6 border-b border-gray-700 pb-4">
      <i class="fa-solid fa-robot text-3xl text-blue-500"></i>
      <h1 class="text-3xl font-bold">Document Copilot</h1>
    </div>

    <div id="chat" class="space-y-6 mb-6 h-[70vh] overflow-y-auto pr-2"></div>

    <div class="flex gap-2">
      <input id="question" type="text" 
             class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500"
             placeholder="Ask anything about your documents..." 
             onkeydown="if(event.key==='Enter') sendQuery();">
      <button onclick="sendQuery()" 
              class="bg-blue-600 hover:bg-blue-700 px-6 rounded-xl flex items-center justify-center">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
    <p class="text-center text-xs text-gray-500 mt-4">Backend: <span id="backend-url" class="font-mono"></span></p>
  </div>

  <script>
    // CHANGE THIS TO YOUR RENDER URL AFTER DEPLOYMENT
    //const BACKEND_URL = "https://your-app-name.onrender.com";
    const BACKEND_URL = "http://localhost:8000";
    document.getElementById("backend-url").textContent = BACKEND_URL;

    function addMessage(text, isUser) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = `flex ${isUser ? "justify-end" : "justify-start"}`;
      div.innerHTML = `
        <div class="${isUser ? "chat-bubble-user" : "chat-bubble-ai"} max-w-[80%] px-5 py-3">
          ${isUser ? `<i class="fa-solid fa-user mr-2"></i>` : `<i class="fa-solid fa-robot mr-2"></i>`}
          ${text}
        </div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendQuery() {
      const input = document.getElementById("question");
      const q = input.value.trim();
      if (!q) return;

      addMessage(q, true);
      input.value = "";

      const loadingId = "loading-" + Date.now();
      const chat = document.getElementById("chat");
      const loadingDiv = document.createElement("div");
      loadingDiv.id = loadingId;
      loadingDiv.innerHTML = `<div class="flex justify-start"><div class="bg-gray-800 text-gray-400 px-5 py-3 rounded-xl flex items-center gap-2"><i class="fa-solid fa-spinner fa-spin"></i> Thinking...</div></div>`;
      chat.appendChild(loadingDiv);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch(`${BACKEND_URL}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q })
        });
        const data = await res.json();

        document.getElementById(loadingId).remove();

        addMessage(data.answer, false);

        if (data.sources && data.sources.length) {
          const sourcesHTML = `<div class="text-xs text-gray-400 mt-2">Sources: ${data.sources.join(", ")}</div>`;
          const lastBubble = chat.lastElementChild.querySelector("div");
          lastBubble.innerHTML += sourcesHTML;
        }
      } catch (e) {
        document.getElementById(loadingId).remove();
        addMessage("Error connecting to backend.", false);
      }
    }
  </script>
</body>
</html>
